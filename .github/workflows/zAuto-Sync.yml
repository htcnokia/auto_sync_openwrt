name: Auto Trigger Remote Workflow

on:
  schedule:
    # 每天北京时间早上 04:30 自动运行（UTC 20:30）
    - cron: '30 20 * * *'
  workflow_dispatch: # 保留手动触发按钮

permissions: write-all

jobs:
  trigger_remote:
    runs-on: ubuntu-latest
    name: Trigger htcnokia/OpenWRT-CI Auto-Sync

    steps:
    - name: Check PAT available
      run: |
        if [ -z "${{ secrets.PAT_TOKEN2 }}" ]; then
          echo "ERROR: secrets.PAT_TOKEN2 is empty" >&2
          exit 1
        fi
        echo "PAT token present (not displayed)."

    - name: Trigger remote workflow via REST API (curl)
      env:
        GITHUB_TOKEN2: ${{ secrets.PAT_TOKEN2 }}
      run: |
        set -euo pipefail
        echo "Triggering workflow 'Auto-Sync.yml' in htcnokia/OpenWRT-CI (ref=main)..."
        curl -sS -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN2" \
          https://api.github.com/repos/htcnokia/OpenWRT-CI/actions/workflows/Auto-Sync.yml/dispatches \
          -d '{"ref":"main"}' \
        && echo "✅ Dispatch request sent."
